version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: savitools
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d savitools"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - '3001:3001'
    environment:
      - NODE_ENV=development
    env_file:
      - apps/api/.env
    command: sh -c "npm install && npm run dev -w @savitools/api"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./:/app
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
    env_file:
      - apps/web/.env
    command: sh -c "npm install && npm run dev -w @savitools/web"
    depends_on:
      api:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
